# ---------------------------------------------------------------
# Site Settings
# ---------------------------------------------------------------

title: Matteo Vitturi
subtitle: Software Engineer & Forth Developer
description: >-
  Software Engineer Venice area.
  Passionate Forth programmer and ZX Spectrum Next developer since 1990.

url: "https://mattsteeldue.github.io"          # Change to your final URL once live
baseurl: ""                                    # Leave empty for root domain

repository: mattsteeldue/mattsteeldue.github.io   # Important for GitHub Pages

# ---------------------------------------------------------------
# Theme Settings (Remote Theme - Best for GitHub Pages)
# ---------------------------------------------------------------

remote_theme: "mmistakes/minimal-mistakes@4.28.0"   # You can update the version later if needed
minimal_mistakes_skin: "dark"                       # Options: default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# ---------------------------------------------------------------
# Build Settings
# ---------------------------------------------------------------

markdown: kramdown
plugins:
  - jekyll-include-cache   # Required for Minimal Mistakes on GitHub Pages

# Include the _pages directory so Jekyll processes those files
include:
  - _pages  

# ---------------------------------------------------------------
# Author / Profile Information (appears in sidebar and about)
# ---------------------------------------------------------------

author:
  name: Matteo Vitturi
  avatar: "/assets/images/bio-photo.jpg"     # Upload your photo to /assets/images/
  bio: >-
    Software Engineer with over 30 years of experience.
    Long-time Forth enthusiast, creator of vForth, and active ZX Spectrum Next developer.
  location: "Venice, Italy"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/matteovitturi"   # Update with your exact LinkedIn URL
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mattsteeldue"
    - label: "X / Twitter"
      icon: "fab fa-fw fa-square-x-twitter"
      url: "https://twitter.com/mattsteel"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your-email@example.com"               # Use a professional or alias email
    - label: "FB"
      icon: "fab fa-fw fa-facebook"
      url: "https://www.facebook.com/mattsteel.mattsteel"

# ---------------------------------------------------------------
# Other Useful Settings
# ---------------------------------------------------------------

search: true                    # Enables site search
paginate: 5                     # Posts per page (if you add a blog later)
paginate_path: "/page/:num/"

# Header / Navigation will be defined in _data/navigation.yml (create this file next)

# Optional: Footer text
footer_text: "&copy; Matteo Vitturi. All rights reserved."
